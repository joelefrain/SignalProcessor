[correction]
remove_mean = true
baseline_order = 1
constrain_final_velocity = true
constrain_final_displacement = false
despike = true
taper_fraction = 0.02
highpass_hz = 0.05
lowpass_hz = 25.0
filter_order = 4
zero_phase = true

[scaling]
damping = 0.05
t_min = 0.2
t_max = 2.0
method = "log_mean_linear_scale"

[matching]
max_iterations = 15
tolerance_percent = 5.0
relaxation = 0.35
max_periods_per_iteration = 10
